name: Stale issues & PRs

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 30
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "P0,pinned,security"
          stale-issue-message: >
            This issue has been inactive for a while. Comment to keep it open,
            or it will close automatically.
          close-issue-message: Closed due to inactivity. Reopen if still relevant.
          stale-pr-message: >
            This PR is stale. Update it or it will be closed.
