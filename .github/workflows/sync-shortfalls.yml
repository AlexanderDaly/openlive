name: Sync shortfalls to issues

# Creates GitHub issues from SHORTFALLS.md entries that are not yet tracked.
# Only parses the "## Active shortfalls" section.
# Marker format:
#   <!-- issue: shortfall-id -->
#   ### Title here
# After creating an issue, commits:
#   <!-- issue: shortfall-id #123 -->

on:
  push:
    branches: [main]
    paths:
      - "SHORTFALLS.md"
      - ".github/workflows/sync-shortfalls.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync SHORTFALLS.md → issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'SHORTFALLS.md';
            if (!fs.existsSync(path)) {
              core.info('No SHORTFALLS.md — skip');
              return;
            }
            let md = fs.readFileSync(path, 'utf8');

            // Only Active shortfalls section (avoid doc examples)
            const activeIdx = md.search(/^## Active shortfalls\s*$/m);
            if (activeIdx < 0) {
              core.info('No Active shortfalls section');
              return;
            }
            const head = md.slice(0, activeIdx);
            let active = md.slice(activeIdx);
            const nextH2 = active.search(/\n## (?!Active shortfalls)/);
            let tail = '';
            if (nextH2 >= 0) {
              tail = active.slice(nextH2);
              active = active.slice(0, nextH2);
            }

            const re = /<!--\s*issue:\s*([a-z0-9-]+)(?:\s+#(\d+))?\s*-->\s*\n###\s+(.+)\n([\s\S]*?)(?=\n<!--\s*issue:|\s*$)/gi;
            const updates = [];
            let m;
            while ((m = re.exec(active)) !== null) {
              const id = m[1];
              const existing = m[2] || null;
              const title = m[3].trim();
              const body = m[4].trim();
              if (!id || id === 'unique-kebab-id' || id === 'your-kebab-id') {
                core.info(`Skip placeholder id ${id}`);
                continue;
              }
              if (existing) {
                core.info(`Skip ${id} — already #${existing}`);
                continue;
              }

              // Dedupe: open issue with same shortfall title
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title.replace(/"/g, '')}"`;
              const found = await github.rest.search.issuesAndPullRequests({ q, per_page: 5 });
              let number = found.data.items.find((i) =>
                i.title === `[shortfall] ${title}` || i.title.includes(title)
              )?.number;

              if (!number) {
                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[shortfall] ${title}`,
                  body: [
                    body,
                    '',
                    '---',
                    `Auto-synced from \`SHORTFALLS.md\` id \`${id}\`.`,
                  ].join('\n'),
                  labels: ['shortfall', 'needs-triage', 'automated'],
                });
                number = created.data.number;
                core.info(`Created #${number} for ${id}`);
              } else {
                core.info(`Matched existing #${number} for ${id}`);
              }
              updates.push({ id, number });
            }

            if (!updates.length) {
              core.info('No marker updates needed');
              return;
            }

            let nextActive = active;
            for (const u of updates) {
              nextActive = nextActive.replace(
                new RegExp(`<!--\\s*issue:\\s*${u.id}\\s*-->`, 'i'),
                `<!-- issue: ${u.id} #${u.number} -->`,
              );
            }
            const next = head + nextActive + tail;
            if (next === md) {
              core.info('Markdown unchanged');
              return;
            }
            fs.writeFileSync(path, next);
            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "41898282+github-actions[bot]@users.noreply.github.com"');
            execSync('git add SHORTFALLS.md');
            execSync('git commit -m "chore: link SHORTFALLS.md markers to issues"');
            execSync('git push');
